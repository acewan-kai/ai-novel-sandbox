# 封闭世界定义：孤岛村庄「雾隐村」
# 这是一个四面环海的小村庄，村民世代以渔业和少量农业为生

world:
  name: "雾隐村"
  description: |
    四面环海的孤岛村庄，常年被薄雾笼罩。村庄虽小，却藏龙卧虎——
    有隐居的前朝官员、有来历不明的商人、有神秘的旅人……
    每个人似乎都有不愿提起的过去。

  location: "东海孤岛·雾隐村"
  era: "明末乱世"
  atmosphere: "神秘、压抑、暗流涌动"

  # 世界规则
  rules:
    - "村民日出而作，日落而息"
    - "外人不易进村，进村者必有故事"
    - "村中有不成文的规矩：不问来处，不问去处"

  # 初始环境状态
  environment:
    time: "清晨"
    weather: "薄雾"
    mood: "平静"
    rumor: "近日海上常有奇怪光影，有人说是海妖，有人说是宝藏在召唤"

  # 地点
  locations:
    - name: "村口老槐树"
      description: "百年老树，村民议事之地"
      NPCs: []
    - name: "渔港码头"
      description: "渔船停靠处，腥咸的海风中混杂着鱼腥味"
      NPCs: []
    - name: "村长宅院"
      description: "青砖灰瓦，气派而威严"
      NPCs: []
    - name: "茶馆"
      description: "村里唯一消磨时间的地方，消息集散地"
      NPCs: []
    - name: "药铺"
      description: "弥漫着草药香气，据说老板医术高明"
      NPCs: []
    - name: "废弃祠堂"
      description: "荒废多年，据说有不干净的东西"
      NPCs: []
    - name: "海边悬崖"
      description: "可俯瞰大海，也是投海自尽者常去之地"
      NPCs: []
